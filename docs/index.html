<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ng-prism — Documentation</title>
  <meta name="description" content="Lightweight, Angular-native component showcase tool — documentation">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css">
  <style>
    :root {
      /* — Prism spectral palette — */
      --prism-void: #07050f;
      --prism-deep: #0d0b1c;
      --prism-surface: #131022;
      --prism-elevated: #1a1535;
      --prism-violet: #a78bfa;
      --prism-violet-deep: #7c3aed;
      --prism-blue: #3b82f6;
      --prism-cyan: #7DD4FE;
      --prism-pink: #ec4899;
      --prism-rose: #FAC3F2;
      --prism-text-primary: #ede9f8;
      --prism-text-secondary: #b0a6c8;
      --prism-text-muted: #8476a2;
      --prism-border: rgba(255,255,255,0.07);
      --prism-glow: rgba(139,92,246,0.18);
      --prism-glow-strong: rgba(139,92,246,0.35);

      /* — Docsify theme overrides — */
      --theme-color: #a78bfa;
      --base-background-color: #0d0b1c;
      --base-color: #ede9f8;

      --sidebar-background: #07050f;
      --sidebar-nav-link-color: #b0a6c8;
      --sidebar-nav-link-color--active: #a78bfa;
      --sidebar-nav-link-color--hover: #ede9f8;
      --sidebar-nav-link-border-color--active: #7c3aed;
      --sidebar-nav-strong-color: #8476a2;
      --sidebar-name-color: #a78bfa;
      --sidebar-width: 280px;

      --link-color: #a78bfa;
      --link-color--hover: #c4b5fd;

      --heading-color: #ede9f8;
      --heading-h2-border-color: rgba(167,139,250,0.12);

      --code-theme-background: #131022;
      --code-inline-background: rgba(167,139,250,0.08);
      --code-inline-color: #c4b5fd;

      --blockquote-border-color: #7c3aed;

      --table-head-background: rgba(167,139,250,0.06);
      --table-row-even-background: rgba(255,255,255,0.02);

      --search-background: #131022;
      --search-result-heading-color: #a78bfa;

      --cover-background-color: #07050f;

      --notice-tip-border-color: #a78bfa;
      --notice-important-border-color: #3b82f6;

      --base-font-family: 'Inter', system-ui, -apple-system, sans-serif;
      --base-font-size: 15px;
      --base-line-height: 1.7;
      --code-font-family: 'Fira Code', ui-monospace, 'Cascadia Code', monospace;
      --code-font-size: 0.875em;

      --content-max-width: 860px;
    }

    /* ——————————————————————————————————————
       Global & Body
    —————————————————————————————————————— */
    * { box-sizing: border-box; }

    body {
      background: var(--prism-deep);
      color: var(--prism-text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ——————————————————————————————————————
       Sidebar — spectral accent line
    —————————————————————————————————————— */
    .sidebar {
      border-right: 1px solid var(--prism-border);
      background: var(--prism-void) !important;
    }

    /* Spectral gradient line at the top of sidebar */
    .sidebar::before {
      content: '';
      display: block;
      height: 2px;
      margin: 0 20px 16px;
      background: linear-gradient(90deg, #7c3aed, #3b82f6, #7DD4FE, #ec4899, #FAC3F2);
      border-radius: 1px;
      opacity: 0.6;
    }

    /* Sidebar app name — logo treatment */
    .sidebar .app-name-link {
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.02em;
      color: var(--prism-text-primary) !important;
      padding: 24px 20px 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Category headers in sidebar */
    .sidebar nav > ul > li > strong,
    .sidebar nav > ul > li > p > strong {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--prism-text-muted);
      margin-top: 20px;
      padding: 4px 0;
    }

    /* Sidebar links */
    .sidebar ul li a {
      font-size: 14px;
      font-weight: 400;
      padding: 5px 0;
      transition: color 0.15s, border-color 0.15s;
    }
    .sidebar ul li a:hover {
      text-decoration: none;
      color: var(--prism-text-primary);
    }
    .sidebar ul li.active > a {
      font-weight: 500;
      color: var(--prism-violet);
      border-right: 2px solid var(--prism-violet-deep);
    }

    /* ——————————————————————————————————————
       Content
    —————————————————————————————————————— */
    .content {
      padding-top: 32px;
    }

    .markdown-section {
      color: var(--prism-text-secondary);
    }

    .markdown-section h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--prism-text-primary);
      margin: 0 0 8px;
      padding: 0;
      border: none;
    }

    /* Spectral underline on h1 */
    .markdown-section h1::after {
      content: '';
      display: block;
      height: 2px;
      width: 64px;
      margin-top: 12px;
      background: linear-gradient(90deg, var(--prism-violet-deep), var(--prism-blue));
      border-radius: 1px;
    }

    .markdown-section h2 {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--prism-text-primary);
      margin: 2em 0 0.6em;
      padding-bottom: 0.4em;
      border-bottom: 1px solid rgba(167,139,250,0.1);
    }

    .markdown-section h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--prism-text-primary);
      margin: 1.6em 0 0.4em;
    }

    .markdown-section p,
    .markdown-section li {
      line-height: 1.75;
      color: var(--prism-text-secondary);
    }

    .markdown-section strong {
      color: var(--prism-text-primary);
      font-weight: 600;
    }

    .markdown-section a {
      text-decoration: none;
      border-bottom: 1px solid rgba(167,139,250,0.3);
      transition: color 0.15s, border-color 0.15s;
    }
    .markdown-section a:hover {
      color: #c4b5fd;
      border-bottom-color: #c4b5fd;
    }

    /* ——————————————————————————————————————
       Code blocks
    —————————————————————————————————————— */
    .markdown-section pre {
      background: var(--prism-surface) !important;
      border: 1px solid var(--prism-border);
      border-radius: 8px;
      padding: 20px 24px;
      font-size: 13px;
      line-height: 1.7;
      overflow-x: auto;
    }

    .markdown-section code {
      font-family: var(--code-font-family);
      font-size: var(--code-font-size);
    }

    .markdown-section p code,
    .markdown-section li code,
    .markdown-section td code {
      background: rgba(167,139,250,0.08);
      color: #c4b5fd;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85em;
    }

    /* ——————————————————————————————————————
       Tables
    —————————————————————————————————————— */
    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
    }
    .markdown-section table thead {
      background: rgba(167,139,250,0.05);
    }
    .markdown-section table th {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--prism-text-muted);
      text-align: left;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(167,139,250,0.12);
    }
    .markdown-section table td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--prism-border);
      font-size: 14px;
    }
    .markdown-section table tr:hover td {
      background: rgba(167,139,250,0.03);
    }

    /* ——————————————————————————————————————
       Blockquotes — violet left border
    —————————————————————————————————————— */
    .markdown-section blockquote {
      border-left: 3px solid var(--prism-violet-deep);
      background: rgba(167,139,250,0.04);
      padding: 12px 20px;
      border-radius: 0 6px 6px 0;
      margin: 1.2em 0;
      color: var(--prism-text-secondary);
    }

    /* ——————————————————————————————————————
       Search
    —————————————————————————————————————— */
    .search {
      border-bottom: 1px solid var(--prism-border) !important;
      padding: 12px 16px !important;
    }
    .search input {
      background: var(--prism-surface) !important;
      border: 1px solid var(--prism-border) !important;
      border-radius: 6px !important;
      color: var(--prism-text-primary) !important;
      padding: 8px 12px !important;
      font-family: var(--base-font-family) !important;
      font-size: 14px !important;
    }
    .search input:focus {
      border-color: rgba(167,139,250,0.4) !important;
      box-shadow: 0 0 0 3px var(--prism-glow) !important;
    }
    .search input::placeholder {
      color: var(--prism-text-muted) !important;
    }

    .matching-post {
      border-bottom: 1px solid var(--prism-border) !important;
    }
    .matching-post h2 {
      color: var(--prism-violet) !important;
    }

    /* ——————————————————————————————————————
       Copy button
    —————————————————————————————————————— */
    .docsify-copy-code-button {
      background: var(--prism-elevated) !important;
      color: var(--prism-text-muted) !important;
      border: 1px solid var(--prism-border) !important;
      border-radius: 4px !important;
      font-size: 12px !important;
      font-family: var(--base-font-family) !important;
    }
    .docsify-copy-code-button:hover {
      color: var(--prism-text-primary) !important;
      border-color: rgba(167,139,250,0.3) !important;
    }

    /* ——————————————————————————————————————
       Scrollbar
    —————————————————————————————————————— */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(167,139,250,0.15);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(167,139,250,0.3);
    }

    /* ——————————————————————————————————————
       Mobile
    —————————————————————————————————————— */
    @media (max-width: 768px) {
      .markdown-section h1 { font-size: 1.6rem; }
      .markdown-section h2 { font-size: 1.15rem; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '<svg viewBox="0 0 1600 1600" width="24" height="24" style="vertical-align:middle;margin-right:8px"><circle cx="800" cy="800" r="720" fill="none" stroke="rgba(167,139,250,0.2)" stroke-width="2"/><path d="M800 400 L1050 1000 L550 1000 Z" fill="url(#pg)" stroke="rgba(167,139,250,0.4)" stroke-width="2"/><defs><linearGradient id="pg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/><stop offset="100%" stop-color="#3b82f6" stop-opacity="0.15"/></linearGradient></defs></svg><span>ng-prism</span>',
      repo: 'https://github.com/dyingangel666/ng-prism',
      loadSidebar: true,
      basePath: location.hostname === 'localhost' ? '/' : '/ng-prism/',
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: 'Search docs...',
        noData: 'No results',
        paths: 'auto',
      },
      copyCode: {
        buttonText: 'Copy',
        successText: 'Copied',
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
</body>
</html>
