name: Deploy Docs + Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: Build ng-prism core + plugins
        run: npx nx run-many -t build --projects=ng-prism,plugin-box-model,plugin-figma,plugin-jsdoc,plugin-perf

      - name: Install test-workspace deps
        working-directory: test-workspace
        env:
          npm_config_registry: https://registry.npmjs.org
        run: npm install

      - name: Scaffold prism app and build demo
        working-directory: test-workspace
        run: |
          # Create ng-prism.config.ts
          cat > ng-prism.config.ts << 'EOF'
          import { defineConfig } from '@ng-prism/core/config';
          export default defineConfig({ plugins: [] });
          EOF

          # Scaffold test-lib-prism app (normally created by ng add)
          mkdir -p projects/test-lib-prism/src/pages

          cat > projects/test-lib-prism/tsconfig.app.json << 'EOF'
          {
            "extends": "../../tsconfig.json",
            "compilerOptions": {
              "outDir": "../../out-tsc/app",
              "types": []
            },
            "files": ["src/main.ts"],
            "include": ["src/**/*.d.ts"]
          }
          EOF

          cat > projects/test-lib-prism/src/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>ng-prism Demo</title>
            <style>* { margin: 0; padding: 0; box-sizing: border-box; } html, body { height: 100%; }</style>
          </head>
          <body>
            <prism-shell></prism-shell>
          </body>
          </html>
          EOF

          cat > projects/test-lib-prism/src/main.ts << 'EOF'
          import { bootstrapApplication } from '@angular/platform-browser';
          import { PrismShellComponent, providePrism } from '@ng-prism/core';
          import { PRISM_RUNTIME_MANIFEST } from './prism-manifest';
          import config from 'ng-prism.config';

          bootstrapApplication(PrismShellComponent, {
            providers: [providePrism(PRISM_RUNTIME_MANIFEST, config)],
          });
          EOF

          # Set baseHref for GitHub Pages subpath
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('angular.json','utf-8'));
            cfg.projects['test-lib-prism'].architect.build.options.baseHref = '/ng-prism/demo/';
            fs.writeFileSync('angular.json', JSON.stringify(cfg, null, 2));
          "

          # Build
          npx ng run test-lib:prism-build

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r docs/* _site/
          cp -r test-workspace/dist/test-lib-prism _site/demo
          cp _site/demo/index.html _site/demo/404.html
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
